# infrastructure.yaml — ProtClaw environment provisioning config
# Consumed by Provisioner (TS), not by AI agents.
# Agent-facing metadata lives in SKILL.md.

environment:
  name: protclaw-cpu
  python: "3.11"
  backends:
    cpu:
      pip:
        - biopython scikit-learn numpy openpyxl jinja2 scipy
    cuda:
      pip:
        - biopython scikit-learn numpy openpyxl jinja2 scipy
    mps:
      pip:
        - biopython scikit-learn numpy openpyxl jinja2 scipy
  patches: []

repos: []
models: []

resources:
  gpu: none
  ram_min_gb: 4
  estimated_runtime:
    cpu: "< 1 min"
  cost_tier: fast

runtime_env: {}
