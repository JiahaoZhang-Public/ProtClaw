# De Novo Protein Design Toolkit Manifest
# This toolkit defines the golden path for de novo protein design.
#
# Pipeline: backbone_generate -> sequence_design -> structure_predict
#   -> structure_qc -> developability_check -> candidate_cluster
#   -> candidate_rank -> experiment_package
#
# Input key names MUST match Python adapter param names exactly,
# because FileRouter injects params by these key names.

name: de-novo-design
version: "0.2.0"
description: "De novo protein backbone and sequence design toolkit"
task_types:
  - de_novo_design
  - binder_design

operations:
  backbone_generate:
    tool: rfdiffusion
    description: "Generate protein backbones using RFdiffusion"
    gpu_required: true
    inputs:
      contigs:
        type: string
        description: "Contig specification for backbone generation"
        required: true
      num_designs:
        type: integer
        default: 10
        description: "Number of backbone designs to generate"
      pdb_template:
        type: file
        format: pdb
        required: false
        description: "Optional template PDB for constrained generation"
    outputs:
      backbones:
        type: file_list
        format: pdb
      scores:
        type: json
    planner_hints:
      typical_runtime: "5-30 minutes per design"
      cost_tier: balanced

  sequence_design:
    tool: proteinmpnn
    description: "Design sequences for given backbones using ProteinMPNN"
    gpu_required: true
    depends_on:
      - backbone_generate
    inputs:
      # Key name matches ProteinMPNN adapter's expected param: pdb_files (list)
      pdb_files:
        type: file_list
        format: pdb
        required: true
        description: "Backbone PDB files from RFdiffusion"
      num_seqs_per_structure:
        type: integer
        default: 8
      sampling_temp:
        type: float
        default: 0.1
    outputs:
      designed_sequences:
        type: file_list
        format: fasta
      scores:
        type: json
    planner_hints:
      typical_runtime: "1-5 minutes per backbone"
      cost_tier: fast

  structure_predict:
    tool: esmfold
    description: "Predict 3D structure from sequence using ESMFold"
    gpu_required: true
    depends_on:
      - sequence_design
    inputs:
      # Key name matches ESMFold adapter's expected param: fasta_files (list)
      fasta_files:
        type: file_list
        format: fasta
        required: true
        description: "FASTA files with designed sequences"
      num_recycles:
        type: integer
        default: 4
    outputs:
      predicted_structures:
        type: file_list
        format: pdb
      plddt_scores:
        type: json
      ptm_score:
        type: float
    planner_hints:
      typical_runtime: "1-10 minutes per sequence"
      cost_tier: balanced

  structure_qc:
    tool: structure-qc
    description: "Assess structural quality (RMSD, clashes, Ramachandran)"
    gpu_required: false
    depends_on:
      - structure_predict
      - backbone_generate
    inputs:
      # Key names match structure_qc adapter's expected params
      predicted_pdb:
        type: file
        format: pdb
        required: true
        description: "Predicted PDB from ESMFold"
      designed_pdb:
        type: file
        format: pdb
        required: true
        description: "Original backbone PDB from RFdiffusion"
    outputs:
      qc_report:
        type: json
    planner_hints:
      typical_runtime: "< 1 minute"
      cost_tier: fast

  developability_check:
    tool: developability
    description: "Check solubility, aggregation risk, expression host compatibility"
    gpu_required: false
    depends_on:
      - sequence_design
    inputs:
      # Key name matches developability adapter's expected param: fasta_file (single)
      fasta_file:
        type: file
        format: fasta
        required: true
        description: "FASTA file with designed sequences"
    outputs:
      developability_report:
        type: json
    planner_hints:
      typical_runtime: "< 1 minute"
      cost_tier: fast

  candidate_cluster:
    tool: candidate-ops
    description: "Cluster candidates for diversity and de-duplication"
    gpu_required: false
    depends_on:
      - structure_qc
      - developability_check
    inputs:
      candidates:
        type: json
        description: "List of candidate dicts with scores (auto-assembled from upstream)"
        required: true
    outputs:
      clusters:
        type: json
    planner_hints:
      typical_runtime: "< 1 minute"
      cost_tier: fast

  candidate_rank:
    tool: candidate-ops
    description: "Evidence-driven multi-objective ranking (Pareto)"
    gpu_required: false
    depends_on:
      - candidate_cluster
    inputs:
      candidates:
        type: json
        required: true
      ranking_criteria:
        type: json
        required: false
    outputs:
      ranked_candidates:
        type: json
    planner_hints:
      typical_runtime: "< 1 minute"
      cost_tier: fast

  experiment_package:
    tool: experiment-package
    description: "Generate experiment-ready candidate cards with assay recommendations"
    gpu_required: false
    depends_on:
      - candidate_rank
    inputs:
      candidates:
        type: json
        required: true
        description: "Ranked candidates list (auto-passed from candidate_rank)"
      project_name:
        type: string
        default: "ProtClaw Design"
    outputs:
      order_sheet:
        type: file
        format: csv
      documentation:
        type: file
        format: html
    planner_hints:
      typical_runtime: "< 1 minute"
      cost_tier: fast
